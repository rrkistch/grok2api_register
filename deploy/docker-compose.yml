services:
  warp:
    extends:
      file: ../docker-compose.register.yml
      service: warp
    restart: unless-stopped

  privoxy:
    extends:
      file: ../docker-compose.register.yml
      service: privoxy
    restart: unless-stopped

  flaresolverr:
    extends:
      file: ../docker-compose.register.yml
      service: flaresolverr
    restart: unless-stopped

  grok2api-init-config:
    extends:
      file: ../docker-compose.register.yml
      service: grok2api-init-config
    restart: "no"

  grok2api:
    extends:
      file: ../docker-compose.register.yml
      service: grok2api
    restart: unless-stopped

  console:
    extends:
      file: ../docker-compose.register.yml
      service: console
    restart: unless-stopped

  worker-runtime:
    build:
      context: ..
      dockerfile: apps/worker-runtime/Dockerfile
    command: bash
    working_dir: /workspace
    volumes:
      - ..:/workspace
    profiles:
      - tools
